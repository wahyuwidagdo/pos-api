basePath: /api/v1
definitions:
  models.Category:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.Product:
    properties:
      category:
        $ref: '#/definitions/models.Category'
      category_id:
        type: integer
      cost:
        description: Harga Modal (penting untuk menghitung profit)
        type: number
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      price:
        description: Harga Jual
        type: number
      sku:
        description: Stock Keeping Unit (kode unik)
        type: string
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  models.Shift:
    properties:
      cash_difference:
        description: Selisih (bisa + atau -)
        type: number
      closed_at:
        type: string
      ending_cash:
        description: Uang di laci saat tutup
        type: number
      expected_cash:
        description: Yang seharusnya (hitung dari transaksi)
        type: number
      id:
        type: integer
      notes:
        description: Catatan kasir
        type: string
      opened_at:
        type: string
      starting_cash:
        description: Modal awal kasir
        type: number
      status:
        description: open, closed
        type: string
      total_sales:
        description: Total penjualan shift ini
        type: number
      total_transactions:
        description: Jumlah transaksi
        type: integer
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Transaction:
    properties:
      cash:
        description: Uang tunai yang dibayarkan pelanggan
        type: number
      change:
        description: Uang kembalian
        type: number
      created_at:
        type: string
      discount:
        type: number
      grand_total:
        description: Total akhir yang harus dibayar
        type: number
      id:
        type: integer
      payment_method:
        description: e.g., "Cash", "QRIS"
        type: string
      total_amount:
        description: Total sebelum diskon/pajak
        type: number
      transaction_code:
        description: 'Contoh: INV-20231016-0001'
        type: string
      transaction_details:
        description: Relasi ke detail
        items:
          $ref: '#/definitions/models.TransactionDetail'
        type: array
    type: object
  models.TransactionDetail:
    properties:
      id:
        type: integer
      price_at_sale:
        description: Harga jual saat transaksi terjadi
        type: number
      product:
        $ref: '#/definitions/models.Product'
      product_id:
        type: integer
      product_name:
        description: Cache nama produk (jika produk diubah, histori transaksi tetap
          benar)
        type: string
      quantity:
        type: integer
      subtotal:
        description: Quantity * PriceAtSale
        type: number
      transaction_id:
        type: integer
    type: object
  models.User:
    properties:
      created_at:
        type: string
      full_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  repositories.ProductReport:
    properties:
      category_name:
        type: string
      current_stock:
        type: integer
      product_id:
        type: integer
      product_name:
        type: string
      total_revenue:
        type: number
      total_sold:
        type: integer
    type: object
  repositories.SalesReport:
    properties:
      average_transaction:
        type: number
      date:
        type: string
      total_items_sold:
        type: integer
      total_sales:
        type: number
      total_transactions:
        type: integer
    type: object
  repositories.SalesSummary:
    properties:
      average_per_day:
        type: number
      total_items_sold:
        type: integer
      total_sales:
        type: number
      total_transactions:
        type: integer
    type: object
  repositories.TopProduct:
    properties:
      product_id:
        type: integer
      product_name:
        type: string
      quantity:
        type: integer
      revenue:
        type: number
    type: object
  services.AuthRequest:
    properties:
      full_name:
        description: Hanya untuk register
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  services.CategoryRequest:
    properties:
      name:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - name
    type: object
  services.CloseShiftRequest:
    properties:
      ending_cash:
        minimum: 0
        type: number
      notes:
        type: string
    required:
    - ending_cash
    type: object
  services.DashboardResponse:
    properties:
      low_stock_count:
        type: integer
      today_items_sold:
        type: integer
      today_sales:
        type: number
      today_transactions:
        type: integer
      top_products:
        items:
          $ref: '#/definitions/repositories.TopProduct'
        type: array
    type: object
  services.ItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  services.OpenShiftRequest:
    properties:
      starting_cash:
        minimum: 0
        type: number
    required:
    - starting_cash
    type: object
  services.ProductReportResponse:
    properties:
      end_date:
        type: string
      products:
        items:
          $ref: '#/definitions/repositories.ProductReport'
        type: array
      start_date:
        type: string
    type: object
  services.ProductRequest:
    properties:
      category_id:
        type: integer
      cost:
        description: Harus lebih besar atau sama dengan 0
        type: number
      description:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      price:
        description: Harus lebih besar dari 0
        type: number
      sku:
        type: string
      stock:
        type: integer
    required:
    - category_id
    - name
    - price
    - stock
    type: object
  services.SalesReportResponse:
    properties:
      daily_data:
        items:
          $ref: '#/definitions/repositories.SalesReport'
        type: array
      end_date:
        type: string
      start_date:
        type: string
      summary:
        $ref: '#/definitions/repositories.SalesSummary'
    type: object
  services.TransactionRequest:
    properties:
      cash:
        description: Uang yang dibayarkan pelanggan
        minimum: 0
        type: number
      discount:
        minimum: 0
        type: number
      items:
        description: Daftar produk yang dibeli
        items:
          $ref: '#/definitions/services.ItemRequest'
        minItems: 1
        type: array
      payment_method:
        description: e.g., "Cash", "QRIS"
        type: string
    required:
    - cash
    - items
    - payment_method
    type: object
  utils.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  utils.PagedResponse:
    properties:
      data:
        description: 'Array data (misal: []Product)'
      message:
        type: string
      page:
        type: integer
      pageSize:
        type: integer
    type: object
  utils.SuccessResponse:
    properties:
      data:
        description: Bisa berisi struct (item tunggal) atau string (token)
      message:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@posmvp.com
    name: Support Tim
  description: Ini adalah dokumentasi untuk Backend API Point of Sale (POS) MVP.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: POS MVP API Documentation
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token for API access
      parameters:
      - description: User login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful, returns JWT token
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  properties:
                    token:
                      type: string
                  type: object
              type: object
        "400":
          description: Invalid input format
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Invalid username or password
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: User Login
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account for the POS system
      parameters:
      - description: User registration credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.AuthRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Username already exists
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Register New User
      tags:
      - Auth
  /categories:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all product categories. Requires Admin or Manager
        role.
      produces:
      - application/json
      responses:
        "200":
          description: List of categories
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Category'
                  type: array
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List All Categories
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: Create a new product category. Requires Admin or Manager role.
      parameters:
      - description: Category data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Category created successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Category'
              type: object
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Category name already exists
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create New Category
      tags:
      - Categories
  /categories/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a category by its ID. Requires Admin or Manager role. Cannot
        delete if category is used by products.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Category deleted successfully
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Invalid category ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Category is used by products and cannot be deleted
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete Category
      tags:
      - Categories
    get:
      consumes:
      - application/json
      description: Retrieve a single category by its ID. Requires Admin or Manager
        role.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Category found
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Category'
              type: object
        "400":
          description: Invalid category ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Category by ID
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: Update an existing category by its ID. Requires Admin or Manager
        role.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated category data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.CategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Category updated successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Category'
              type: object
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Category name conflicts with existing category
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update Category
      tags:
      - Categories
  /dashboard:
    get:
      consumes:
      - application/json
      description: Get today's sales summary including total sales, transaction count,
        items sold, low stock alerts, and top-selling products. Requires Admin or
        Manager role.
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard data retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/services.DashboardResponse'
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Dashboard Statistics
      tags:
      - Dashboard
  /products:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of all products. Requires Admin or Manager
        role.
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 10
        description: 'Number of items per page (default: 10)'
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of products
          schema:
            allOf:
            - $ref: '#/definitions/utils.PagedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Product'
                  type: array
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List All Products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Create a new product in the inventory. Requires Admin or Manager
        role.
      parameters:
      - description: Product data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.ProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Product created successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Product'
              type: object
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Product SKU or name already exists
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create New Product
      tags:
      - Products
  /products/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a product by its ID. Requires Admin or Manager role. Cannot
        delete if product is used in transactions.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product deleted successfully
          schema:
            $ref: '#/definitions/utils.SuccessResponse'
        "400":
          description: Invalid product ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Product not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Product is used in transactions and cannot be deleted
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete Product
      tags:
      - Products
    get:
      consumes:
      - application/json
      description: Retrieve a single product by its ID. Requires Admin or Manager
        role.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product found
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Product'
              type: object
        "400":
          description: Invalid product ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Product not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Product by ID
      tags:
      - Products
    put:
      consumes:
      - application/json
      description: Update an existing product by its ID. Requires Admin or Manager
        role.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated product data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.ProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Product updated successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Product'
              type: object
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Product not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: Product SKU or name conflicts with existing product
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update Product
      tags:
      - Products
  /products/low-stock:
    get:
      consumes:
      - application/json
      description: Retrieve products with stock at or below the threshold. Useful
        for inventory alerts. Requires Admin or Manager role.
      parameters:
      - default: 10
        description: 'Stock threshold (default: 10)'
        in: query
        name: threshold
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Low stock products
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Product'
                  type: array
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Low Stock Products
      tags:
      - Products
  /reports/products:
    get:
      consumes:
      - application/json
      description: Get product sales performance for a date range, sorted by quantity
        sold. Requires Admin or Manager role.
      parameters:
      - description: Start date (YYYY-MM-DD)
        example: "2026-02-01"
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        example: "2026-02-08"
        in: query
        name: end_date
        required: true
        type: string
      - default: 20
        description: 'Limit results (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product report retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/services.ProductReportResponse'
              type: object
        "400":
          description: Invalid date format or range
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Product Performance Report
      tags:
      - Reports
  /reports/sales:
    get:
      consumes:
      - application/json
      description: Get sales report for a date range including daily breakdown and
        summary. Requires Admin or Manager role.
      parameters:
      - description: Start date (YYYY-MM-DD)
        example: "2026-02-01"
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        example: "2026-02-08"
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Sales report retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/services.SalesReportResponse'
              type: object
        "400":
          description: Invalid date format or range
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Sales Report
      tags:
      - Reports
  /shifts:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all shifts (open and closed). Requires
        Admin or Manager role.
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 10
        description: 'Items per page (default: 10)'
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of shifts
          schema:
            allOf:
            - $ref: '#/definitions/utils.PagedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Shift'
                  type: array
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List All Shifts
      tags:
      - Shifts
  /shifts/{id}:
    get:
      consumes:
      - application/json
      description: Get shift details by ID including reconciliation data. Requires
        Admin or Manager role.
      parameters:
      - description: Shift ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Shift data
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Shift'
              type: object
        "400":
          description: Invalid shift ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Shift not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Shift by ID
      tags:
      - Shifts
  /shifts/close:
    post:
      consumes:
      - application/json
      description: Close the currently open shift with ending cash count. Calculates
        expected vs actual cash and difference. Requires authentication.
      parameters:
      - description: Ending cash amount and notes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.CloseShiftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Shift closed successfully with reconciliation
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Shift'
              type: object
        "400":
          description: Invalid input or no open shift
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Close Current Shift
      tags:
      - Shifts
  /shifts/current:
    get:
      consumes:
      - application/json
      description: Get the currently open shift with real-time transaction summary.
        Requires authentication.
      produces:
      - application/json
      responses:
        "200":
          description: Current shift data
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Shift'
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: No open shift found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Current Open Shift
      tags:
      - Shifts
  /shifts/open:
    post:
      consumes:
      - application/json
      description: Open a new cashier shift with starting cash amount. Only one shift
        can be open at a time. Requires authentication.
      parameters:
      - description: Starting cash amount
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.OpenShiftRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Shift opened successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Shift'
              type: object
        "400":
          description: Invalid input or shift already open
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "409":
          description: A shift is already open
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Open New Shift
      tags:
      - Shifts
  /transactions:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all sales transactions. Requires Admin or Manager
        role.
      produces:
      - application/json
      responses:
        "200":
          description: List of transactions
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Transaction'
                  type: array
              type: object
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List All Transactions
      tags:
      - Transactions
    post:
      consumes:
      - application/json
      description: Process a new sales transaction. Automatically deducts stock, calculates
        totals, and generates invoice code. Accessible by all authenticated roles
        (Admin, Manager, Cashier).
      parameters:
      - description: Transaction data with items
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.TransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Transaction processed successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Transaction'
              type: object
        "400":
          description: Invalid input, insufficient stock, or insufficient payment
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Product not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create New Transaction (Sales)
      tags:
      - Transactions
  /transactions/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a single transaction with its details. Requires Admin
        or Manager role.
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Transaction found
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Transaction'
              type: object
        "400":
          description: Invalid transaction ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Transaction not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Transaction by ID
      tags:
      - Transactions
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
